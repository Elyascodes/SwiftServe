<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SwiftServe</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Permanent+Marker&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles/app.css" />
</head>
<body>

<div id="app" class="screen"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="components/api.js"></script>
<script src="components/floormap.js"></script>
<script src="components/mytimesheet.js"></script>
<script>
    const employee = JSON.parse(sessionStorage.getItem('employee') || 'null');
    if (!employee) { window.location.href = 'index.html'; }

    // ── Global helpers used by every role page ──
    function logout() {
        sessionStorage.removeItem('employee');
        window.location.href = 'index.html';
    }

    function showToast(message, type) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const t = document.createElement('div');
        t.className = 'toast ' + (type || '');
        t.textContent = message;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    // Clock in/out helpers exposed for pages that need them
    let _isClockedIn = false;
    async function refreshClockStatus() {
        try {
            const s = await api.getClockStatus(employee.employeeId);
            _isClockedIn = !!s.clockedIn;
        } catch {}
        return _isClockedIn;
    }
    async function toggleClock() {
        try {
            if (_isClockedIn) { await api.clockOut(employee.employeeId); showToast('Clocked out', 'success'); }
            else              { await api.clockIn(employee.employeeId);  showToast('Clocked in', 'success'); }
            _isClockedIn = !_isClockedIn;
            return _isClockedIn;
        } catch (e) { showToast(e.message, 'error'); return _isClockedIn; }
    }

    // ── Role router ──
    function loadRolePage() {
        const role = (employee.role || '').toUpperCase();
        let script;
        switch (role) {
            case 'WAITER':  script = 'pages/waiter.js'; break;
            case 'CHEF':    script = 'pages/cook.js'; break;
            case 'BUSBOY':  script = 'pages/busboy.js'; break;
            case 'MANAGER': script = 'pages/manager.js'; break;
            default:
                document.getElementById('app').innerHTML = '<p style="padding:30px">Unknown role: ' + role + '</p>';
                return;
        }
        const s = document.createElement('script');
        s.src = script;
        document.body.appendChild(s);
    }

    refreshClockStatus().then(loadRolePage);
</script>

</body>
</html>
