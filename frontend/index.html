<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwiftServe – Staff Sign In</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #12122a;
      font-family: 'Inter', sans-serif;
    }

    .card {
      display: flex;
      width: 780px;
      min-height: 440px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.55);
    }

    /* ── Left branding panel ── */
    .brand-panel {
      width: 42%;
      background: #f25a50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 40px 24px;
      position: relative;
    }

    /* subtle darker strip behind the brand text */
    .brand-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,0,0,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .brand-logo {
      font-family: 'Press Start 2P', monospace;
      font-size: 1.35rem;
      color: #12122a;
      line-height: 1.7;
      text-align: center;
      letter-spacing: 1px;
      z-index: 1;
    }

    .brand-sub {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 4px;
      color: #12122a;
      z-index: 1;
    }

    /* ── Right form panel ── */
    .form-panel {
      flex: 1;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px 44px;
      gap: 28px;
    }

    .form-panel h1 {
      font-size: 1.65rem;
      font-weight: 700;
      color: #12122a;
      letter-spacing: 1px;
    }

    .fields {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #e8e8e8;
      border-radius: 10px;
      padding: 14px 18px;
    }

    .input-wrap .icon {
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .input-wrap input {
      border: none;
      background: transparent;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 2px;
      color: #444;
      width: 100%;
    }

    .input-wrap input::placeholder {
      color: #888;
      font-weight: 600;
      letter-spacing: 2px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-top: 4px;
    }

    .btn-signin {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 50px;
      background: #f25a50;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-signin:hover  { background: #d94840; }
    .btn-signin:active { transform: scale(0.98); }

    .btn-forgot {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 50px;
      background: #12122a;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-forgot:hover { background: #2a2a4a; }

    /* error message */
    .error-msg {
      color: #d94840;
      font-size: 0.8rem;
      font-weight: 600;
      min-height: 18px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="card">
  <!-- Left -->
  <div class="brand-panel">
    <div class="brand-logo">SWIFT<br>SERVE</div>
    <div class="brand-sub">BY SWIFTX</div>
  </div>

  <!-- Right -->
  <div class="form-panel">
    <h1>STAFF SIGN IN</h1>

    <div class="fields">
      <div class="input-wrap">
        <span class="icon">&#128100;</span>
        <input
          id="empId"
          type="text"
          placeholder="EMPLOYEE ID"
          maxlength="6"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <div class="input-wrap">
        <span class="icon">&#128274;</span>
        <input
          id="password"
          type="password"
          placeholder="PASSWORD"
          autocomplete="off"
        />
      </div>
    </div>

    <p class="error-msg" id="errorMsg"></p>

    <div class="actions">
      <button class="btn-signin" onclick="handleSignIn()">Sign In</button>
      <button class="btn-forgot" onclick="handleForgot()">FORGOT ID/PASS</button>
    </div>
  </div>
</div>

<script>
  // If already logged in, go straight to the app
  if (sessionStorage.getItem('employee')) {
    window.location.href = 'app.html';
  }

  const BANNED_PASSWORDS = ['1111', '123456', '000000', '111111', '123123', '654321'];

  async function handleSignIn() {
    const empId    = document.getElementById('empId').value.trim().toUpperCase();
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('errorMsg');
    const btn      = document.querySelector('.btn-signin');

    errEl.textContent = '';

    // ── Client-side checks (mirrors backend rules) ──
    if (!/^[A-Za-z0-9]{6}$/.test(empId)) {
      errEl.textContent = 'Employee ID must be exactly 6 alphanumeric characters.';
      return;
    }

    if (password.length < 4) {
      errEl.textContent = 'Password is too short.';
      return;
    }

    if (BANNED_PASSWORDS.includes(password)) {
      errEl.textContent = 'Password is not allowed.';
      return;
    }

    // ── Send to backend ──
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const res = await fetch('http://localhost:8080/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ employeeId: empId, password })
      });

      const data = await res.json();

      if (res.ok) {
        sessionStorage.setItem('employee', JSON.stringify(data));
        window.location.href = 'app.html';
      } else {
        errEl.textContent = data.message || 'Sign-in failed.';
      }
    } catch {
      errEl.textContent = 'Cannot reach the server. Is the backend running?';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  function handleForgot() {
    // TODO: implement forgot ID/password flow
    alert('Please contact your manager to reset your credentials.');
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleSignIn();
  });
</script>

</body>
</html>
