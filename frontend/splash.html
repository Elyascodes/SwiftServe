<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>SwiftServe</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #12122a;
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            user-select: none;
            -webkit-app-region: drag;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 6px;
            color: #f25a50;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 0.75rem;
            color: #6060a0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .spinner-wrap {
            margin-top: 10px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #1e1e4a;
            border-top-color: #f25a50;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .status {
            font-size: 0.68rem;
            color: #5050a0;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="logo">SWIFTSERVE</div>
    <div class="tagline">Restaurant Management System</div>
    <div class="spinner-wrap">
        <div class="spinner"></div>
    </div>
    <div class="status">Starting services&hellip;</div>
</body>
</html>
